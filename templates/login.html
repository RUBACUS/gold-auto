<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Login – TaaraLaxmii</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-brand">
                <h1>TaaraLaxmii</h1>
                <small>Gold Price Dashboard</small>
            </div>
            <form id="loginForm" onsubmit="return doLogin(event)">
                <div class="login-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="btnLogin">Sign In</button>
            </form>
            <div class="login-error" id="errorMsg"></div>
        </div>
    </div>

    <script>
    async function doLogin(e) {
        e.preventDefault();
        var btn = document.getElementById('btnLogin');
        var errEl = document.getElementById('errorMsg');
        errEl.style.display = 'none';

        btn.disabled = true;
        btn.textContent = 'Signing in\u2026';

        try {
            var resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value
                })
            });
            var data = await resp.json();

            if (data.ok) {
                window.location.href = '/';
            } else {
                errEl.textContent = data.error || 'Login failed';
                errEl.style.display = 'block';
            }
        } catch (err) {
            errEl.textContent = 'Connection error. Please try again.';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }
    </script>
</body>
</html>
